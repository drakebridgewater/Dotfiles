
#source ~/.local/lib/python2.7/site-packages/powerline/bindings/tmux/powerline.conf

###############################################################################
# globals
###############################################################################
# C-b is not acceptable -- Vim uses it
set-option -g prefix C-a
set-option -g default-shell /bin/zsh

# if run as "tmux attach", create a session if one does not already exist
new-session -n $HOST

# large history
set-option -g history-limit 10000

# Colors {{{
set -g default-terminal "screen-256color"
set-window-option -g mode-keys vi

# clock
set-window-option -g clock-mode-colour green #green

# Vi copypaste mode
set-window-option -g mode-keys vi
bind-key -t vi-copy 'v' begin-selection
bind-key -t vi-copy 'y' copy-selection

# Copy mode
#unbind [
#unbind ]
bind Escape copy-mode
#bind p paste-buffer
#set-window-option -g monitor-activity off
#set-window-option -g monitor-content off

bind-key C-a last-window
bind C-j previous-window
bind C-k next-window

# Start numbering at 1
set -g base-index 1

# Allows for faster key repetition
#set -s escape-time 0

# Rather than constraining window size to the maximum size of any client
# connected to the *session*, constrain window size to the maximum size of any
# client connected to *that window*. Much more reasonable.
setw -g aggressive-resize on

# Allows us to use C-a a <command> to send commands to a TMUX session inside
# another TMUX session
bind-key a send-prefix

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity on

# reload config
bind e source-file ~/.tmux.conf \; display-message "Config reloaded..."

# auto window rename
set-window-option -g automatic-rename off

# Titles

# Commands
bind / command-prompt -p "man page: " "split-window 'exec man %%'"
#bind s set-window-option synchronize-panes

#bind A command-prompt "rename-window %%"

# Sane scrolling
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

###############################################################################
# mouse stuff
###############################################################################
# Enable mouse control (clickable windows, panes, resizable panes)
# set -g mouse-select-window on
# set -g mouse-select-pane on
# set -g mouse-resize-pane on

###############################################################################
# windows
###############################################################################
bind-key C command-prompt -p "Name of new window: " "new-window -n '%%'"

# set window split
bind-key v split-window -h
bind-key b split-window

# message text
set-option -g message-bg colour235 #base02
set-option -g message-fg colour166 #orange

set-window-option -g window-status-current-bg white
set-window-option -g window-status-current-fg black

set-window-option -g window-status-bg green
set-window-option -g window-status-fg black

set-window-option -g window-status-bell-fg red
set-window-option -g window-status-bell-bg white

set-window-option -g window-status-activity-fg yellow
set-window-option -g window-status-activity-bg red

# set-window-option -g utf8 on


###############################################################################
# panes
###############################################################################
# pane border
set-option -g pane-border-fg colour235 #base02
set-option -g pane-active-border-fg colour240 #base01

# set window split
# pane number display
set-option -g display-panes-active-colour colour33 #blue
set-option -g display-panes-colour colour166 #orange

# Panes
bind up resize-pane -U 10
bind down resize-pane -D 10
bind left resize-pane -L 10
bind right resize-pane -R 10
bind tab next-layout
unbind C-o
bind r rotate-window
bind space select-pane -t:.+

# new split in current pane (horizontal / vertical)
bind-key - split-window -v # split pane horizontally
bind-key \ split-window -h # split pane vertically

# Set the characters that split the panes to look nices
set-option -ga terminal-overrides ',*:enacs@:smacs@:rmacs@:acsc@'

#  # list panes
bind-key Space list-panes

#   # break-pane
bind-key Enter break-pane

# hjkl pane traversal
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

###############################################################################
# status bar
###############################################################################
#set -g status-interval 1
#set -g status-justify left #centre # center align window list
#set -g status-left-length 20
#set -g status-right-length 140
# set -g status-left '#[fg=green]#H #[fg=black]• #[fg=green,bright]#(uname -r | cut -c 1-6)#[default]'
#set -g status-right '#[fg=green,bg=default,bright]#(tmux-mem-cpu-load -i 1) #[fg=red,dim,bg=default]#(uptime | cut -f 4-5 -d " " | cut -f 1 -d ",") #[fg=white,bg=default]%a%l:%M:%S %p#[default] #[fg=white]%Y-%m-%d'

set -g status on
set -g status-interval 10
set -g status-fg colour231
set -g status-bg colour234
set -g status-left-length 20
set -g status-left '#{?client_prefix,#[fg=colour254]#[bg=colour31]#[bold],#[fg=colour16]#[bg=colour254]#[bold]} #S #{?client_prefix,#[fg=colour31]#[bg=colour234]#[nobold],#[fg=colour254]#[bg=colour234]#[nobold]}'
#set -g status-right '#(eval cut -c3- ~/.tmux.conf | sh -s status_right) #h '
set -g status-right '#[fg=green,bg=default,bright]#(tmux-mem-cpu-load -i 1) #[fg=red,dim,bg=default]#(uptime | cut -f 4-5 -d " " | cut -f 1 -d ",") #[fg=white,bg=default]%a%l:%M:%S %p#[default] #[fg=white]%Y-%m-%d'
set -g status-right-length 150
set -g window-status-format "#[fg=colour244,bg=colour234]#I #[fg=colour240] #[default]#W "
set -g window-status-current-format "#[fg=colour234,bg=colour31]#[fg=colour117,bg=colour31] #I  #[fg=colour231,bold]#W #[fg=colour31,bg=colour234,nobold]"
set -g window-status-last-style fg=colour31

set-window-option -g window-status-fg colour249
set-window-option -g window-status-activity-attr none
set-window-option -g window-status-bell-attr none
set-window-option -g window-status-activity-fg yellow
set-window-option -g window-status-bell-fg red

set-option -g visual-activity on

# Titles (window number, program name, active (or not)
set-option -g set-titles on
set-option -g set-titles-string '#H:#S.#I.#P #W #T'

# set to main-horizontal, 60% height for main pane
#bind m set-window-option main-pane-height 60\; select-layout main-horizontal

# for vim
#set -g @resurrect-strategy-vim 'session'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
#set -g @resurrect-strategy-vim 'session'

set -g @plugin 'tmux-plugins/tmux-resurrect'
#set -g @plugin 'tmux-plugins/tmux-continuum'
#set -g @resurrect-capture-pane-contents 'on'



# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
